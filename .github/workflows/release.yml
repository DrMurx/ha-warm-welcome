name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set manifest version to release tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          jq --arg v "$version" '.version = $v' \
            custom_components/vacation_heating/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/vacation_heating/manifest.json

      - name: Create zip
        run: |
          cd custom_components/vacation_heating
          zip -r ../../vacation_heating.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: vacation_heating.zip
