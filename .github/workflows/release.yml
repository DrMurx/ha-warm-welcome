name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set manifest and card version to release tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          jq --arg v "$version" '.version = $v' \
            custom_components/warm_welcome/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/warm_welcome/manifest.json
          sed -i "s/^const CARD_VERSION = \".*\";/const CARD_VERSION = \"$version\";/" \
            custom_components/warm_welcome/frontend/warm-welcome-card.js
          grep -q "CARD_VERSION = \"$version\"" \
            custom_components/warm_welcome/frontend/warm-welcome-card.js

      - name: Create zip
        run: |
          cd custom_components/warm_welcome
          zip -r ../../warm_welcome.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: warm_welcome.zip
